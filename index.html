<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SIMIS Analyse</title>

<style>
  body{
    font-family:system-ui,Segoe UI,Roboto,sans-serif;
    max-width:900px;
    margin:auto;
    padding:30px;
  }
  .card{
    border:1px solid #ddd;
    border-radius:12px;
    padding:20px;
  }
  .row{
    display:flex;
    gap:12px;
    flex-wrap:wrap;
    align-items:center;
    margin-top:12px;
  }
  button{
    padding:10px 16px;
    border-radius:10px;
    border:1px solid #ccc;
    background:white;
    cursor:pointer;
  }
  button:disabled{ opacity:.5; cursor:not-allowed; }
  pre{
    background:#f7f7f7;
    padding:12px;
    border-radius:8px;
    max-height:260px;
    overflow:auto;
    white-space:pre-wrap;
  }
  .footer{
    margin-top:30px;
    font-size:13px;
    color:#777;
    text-align:center;
  }
</style>
</head>

<body>

<h1>SIMIS Analyse</h1>
<p>Bitte alle für die Auswertung relevanten Dimotools Protokolle auswählen.</p>

<div class="card">
  <div class="row">
    <input id="files" type="file" multiple accept=".html,.htm">
  </div>

  <div class="row">
    <label>
      <input type="checkbox" id="addFilename" checked>
      Dateiname-Spalte hinzufügen
    </label>
  </div>

  <div class="row">
    <button id="build" disabled>Auswertung erzeugen</button>
    <span id="status"></span>
  </div>

  <h3>Log</h3>
  <pre id="log"></pre>
</div>

<div class="footer">Copyright Jonas Gelhaus 2026</div>

<script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>

<script>
  const fileInput = document.getElementById("files");
  const buildBtn = document.getElementById("build");
  const logEl = document.getElementById("log");
  const statusEl = document.getElementById("status");
  const addFilename = document.getElementById("addFilename");

  let selectedFiles = [];
  const fileCache = new Map();
  let anlagenName = "SIMIS";

  const THRESHOLD_SECONDS = 240;
  const START_SIGNAL = "031/05 HP-Schnittstelle 1: Einschaltung";
  const END_SIGNAL = "001/02 Ausschaltabschnitt 1: Befahren";
  const BUE_SIGNAL = "023/01 FÜ-Schnittstelle meldet 'BÜ Eingeschaltet'";

  // ---------- Encoding ----------
  function readFileSmart(file){
    return new Promise((resolve,reject)=>{
      const r = new FileReader();
      r.onload = ()=>{
        const buf = r.result;
        const utf8 = new TextDecoder("utf-8").decode(buf);
        if (utf8.includes("Ã") || utf8.includes("�")) {
          resolve(new TextDecoder("windows-1252").decode(buf));
        } else {
          resolve(utf8);
        }
      };
      r.onerror = ()=>reject(r.error);
      r.readAsArrayBuffer(file);
    });
  }

  // ---------- Zeitberechnung ----------
  const MONTHIDX = {Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};
  function toMs(d,z){
    const dm = /(\d{2})\.([A-Za-z]{3})\.(\d{2})/.exec(d);
    const tm = /(\d{2}):(\d{2}):(\d{2})\.(\d{3})/.exec(z);
    if(!dm || !tm) return NaN;
    return Date.UTC(
      2000 + Number(dm[3]),
      MONTHIDX[dm[2]],
      Number(dm[1]),
      Number(tm[1]),
      Number(tm[2]),
      Number(tm[3]),
      Number(tm[4])
    );
  }

  // ---------- Datum formatieren ----------
  const MONTH = {Jan:"01",Feb:"02",Mar:"03",Apr:"04",May:"05",Jun:"06",Jul:"07",Aug:"08",Sep:"09",Oct:"10",Nov:"11",Dec:"12"};
  function formatDate(d){
    const m = /(\d{2})\.([A-Za-z]{3})\.(\d{2})/.exec(d);
    if(!m) return d;
    return `${m[1]}.${MONTH[m[2]]}.20${m[3]}`;
  }

  // ---------- Prozent formatieren ----------
  function formatPercent(part, whole){
    if (!whole || whole <= 0) return "0,00 %";
    const val = (part / whole) * 100;
    return `${val.toFixed(2).replace(".", ",")} %`;
  }

  // ---------- Anlagenname säubern ----------
  function sanitizeAnlageName(raw){
    let name = (raw || "").trim();
    name = name.replace(/_BR_.*/i, "");
    name = name.replace(/GPS-Position.*/i, "");
    name = name.replace(/<[^>]*>/g, "");
    name = name.replace(/\s+/g, "_");
    name = name.replace(/[^\w\-,.]/g, "");
    name = name.replace(/_+/g, "_").replace(/^_+|_+$/g, "");
    return name || "SIMIS";
  }

  function isCopyrightLine(s){
    const t = (s || "").toLowerCase();
    return t.includes("copyright") && t.includes("all rights reserved");
  }

  // ---------- Parser ----------
  function parseLog(text){
    const header = /Anlage:\s*([^\n\r<]+)/.exec(text);
    if(header){
      anlagenName = sanitizeAnlageName(header[1]);
    }

    const ts = `(\\d{2}\\.[A-Za-z]{3}\\.\\d{2})\\s+(\\d{2}:\\d{2}:\\d{2}\\.\\d{3})`;
    const re = new RegExp(ts + "\\s+([\\s\\S]*?)(?=\\s*" + ts + "|\\s*$)", "g");

    const rows = [];
    let m;

    while ((m = re.exec(text)) !== null) {
      let ereignis = (m[3] || "")
        .replace(/<br\s*\/?>/gi," ")
        .replace(/\s*\n\s*/g," ")
        .replace(/\s{2,}/g," ")
        .trim();

      if (!ereignis) continue;
      if (ereignis.includes("SIEMENS AG - Transportation Systems")) continue;
      if (isCopyrightLine(ereignis)) continue;

      rows.push({ Datum: m[1], Zeit: m[2], Ereignis: ereignis });
    }

    return rows;
  }

  // ---------- Zählungen ----------
  function countHpStarts(rows){
    return rows.filter(r => (r.Ereignis || "").includes(START_SIGNAL)).length;
  }

  function countBueStarts(rows){
    return rows.filter(r => {
      const e = r.Ereignis || "";
      return e.includes(START_SIGNAL) || e.includes(BUE_SIGNAL);
    }).length;
  }

  // ---------- Sekunden-Spalte ----------
  function addSeconds(rows){
    let startMs = null;

    rows.forEach(r=>{
      r["Sekunden (Start→Ausschaltung)"] = "";
      const ms = toMs(r.Datum, r.Zeit);
      if (!Number.isFinite(ms)) return;

      if ((r.Ereignis || "").includes(START_SIGNAL)) {
        startMs = ms;
        return;
      }

      if (startMs !== null && (r.Ereignis || "").includes(END_SIGNAL)) {
        r["Sekunden (Start→Ausschaltung)"] = Number(((ms - startMs)/1000).toFixed(3));
        startMs = null;
      }
    });
  }

  // ---------- Ergebnisblatt ----------
  function buildResults(rows){
    let startRow = null;
    const res = [];

    rows.forEach(r=>{
      const ms = toMs(r.Datum, r.Zeit);
      if (!Number.isFinite(ms)) return;

      if ((r.Ereignis || "").includes(START_SIGNAL)) {
        startRow = r;
        return;
      }

      if (startRow && (r.Ereignis || "").includes(END_SIGNAL)) {
        const diff = (ms - toMs(startRow.Datum, startRow.Zeit)) / 1000;

        res.push({
          "Startsignal": `${formatDate(startRow.Datum)} ${startRow.Zeit}`,
          "Ausschaltung": `${formatDate(r.Datum)} ${r.Zeit}`,
          "Endsignal": END_SIGNAL,
          "Dauer Sekunden": Number(diff.toFixed(3))
        });

        startRow = null;
      }
    });

    return res;
  }

  // ---------- Statistik ----------
  function buildStats(results, rows, dateStr, anlage){
    const stats = [];

    const hpStarts = countHpStarts(rows);
    const bueStarts = countBueStarts(rows);

    stats.push({ Kennzahl: "Datum (Auswertung)", Wert: dateStr });
    stats.push({ Kennzahl: "Anlage", Wert: anlage });
    stats.push({ Kennzahl: "Startsignal", Wert: START_SIGNAL });
    stats.push({ Kennzahl: "Endsignal", Wert: END_SIGNAL });
    stats.push({ Kennzahl: "Schwellwert (s)", Wert: THRESHOLD_SECONDS });
    stats.push({ Kennzahl: "Einschaltungen HP gesamt", Wert: hpStarts });
    stats.push({ Kennzahl: "Einschaltungen BÜ gesamt", Wert: bueStarts });

    if (!results.length) {
      stats.push({ Kennzahl: `> ${THRESHOLD_SECONDS}s`, Wert: 0 });
      stats.push({ Kennzahl: `≤ ${THRESHOLD_SECONDS}s`, Wert: 0 });
      stats.push({ Kennzahl: `% > ${THRESHOLD_SECONDS}s von allen Schließungen`, Wert: "0,00 %" });
      stats.push({ Kennzahl: `% > ${THRESHOLD_SECONDS}s von HP-Einschaltungen`, Wert: "0,00 %" });
      return stats;
    }

    const durs = results.map(r => r["Dauer Sekunden"]).filter(v => Number.isFinite(v));
    const n = durs.length;

    const sum = durs.reduce((a,b)=>a+b,0);
    const avg = sum / n;
    const min = Math.min(...durs);
    const max = Math.max(...durs);

    const sorted = [...durs].sort((a,b)=>a-b);
    const median = (n % 2 === 1)
      ? sorted[(n-1)/2]
      : (sorted[n/2 - 1] + sorted[n/2]) / 2;

    const bad = durs.filter(v => v > THRESHOLD_SECONDS).length;
    const good = n - bad;

    stats.push({ Kennzahl: `> ${THRESHOLD_SECONDS}s`, Wert: bad });
    stats.push({ Kennzahl: `≤ ${THRESHOLD_SECONDS}s`, Wert: good });
    stats.push({ Kennzahl: `% > ${THRESHOLD_SECONDS}s von allen Schließungen`, Wert: formatPercent(bad, n) });
    stats.push({ Kennzahl: `% > ${THRESHOLD_SECONDS}s von HP-Einschaltungen`, Wert: formatPercent(bad, hpStarts) });

    stats.push({ Kennzahl: "Mittelwert (s)", Wert: Number(avg.toFixed(3)) });
    stats.push({ Kennzahl: "Median (s)", Wert: Number(median.toFixed(3)) });
    stats.push({ Kennzahl: "Minimum (s)", Wert: Number(min.toFixed(3)) });
    stats.push({ Kennzahl: "Maximum (s)", Wert: Number(max.toFixed(3)) });

    return stats;
  }

  // ---------- Styling ----------
  function highlightBadRows(ws, results, thresholdSeconds){
    const range = XLSX.utils.decode_range(ws["!ref"] || "A1:A1");
    const styleYellow = {
      fill: { patternType: "solid", fgColor: { rgb: "FFF2CC" } }
    };

    for (let i = 0; i < results.length; i++){
      const dur = results[i]["Dauer Sekunden"];
      if (!Number.isFinite(dur) || dur <= thresholdSeconds) continue;

      const rowNumber = 2 + i;
      for (let c = range.s.c; c <= range.e.c; c++){
        const addr = XLSX.utils.encode_cell({ r: rowNumber - 1, c });
        if (!ws[addr]) ws[addr] = { t: "s", v: "" };
        ws[addr].s = styleYellow;
      }
    }
  }

  // ---------- UI ----------
  fileInput.addEventListener("change", async () => {
    selectedFiles = [...fileInput.files];
    fileCache.clear();
    logEl.textContent = "";
    statusEl.textContent = "";
    buildBtn.disabled = true;

    if (!selectedFiles.length) return;

    logEl.textContent = "Dateien werden analysiert...\n";

    try {
      for (const f of selectedFiles) {
        const html = await readFileSmart(f);
        fileCache.set(f.name, html);
        const rows = parseLog(html);
        logEl.textContent += `✓ ${f.name}: ${rows.length} Zeilen\n`;
      }

      buildBtn.disabled = false;
      statusEl.textContent = "Bereit.";
      logEl.textContent += `\nStartsignal: ${START_SIGNAL}\n`;
      logEl.textContent += `Endsignal: ${END_SIGNAL}\n`;

    } catch (e) {
      console.error(e);
      statusEl.textContent = "Fehler beim Einlesen (Konsole).";
      logEl.textContent += `\nFehler: ${e?.message || e}\n`;
      buildBtn.disabled = true;
    }
  });

  // ---------- Export ----------
  buildBtn.addEventListener("click", async () => {
    if (!selectedFiles.length) return;

    logEl.textContent += "\nAuswertung läuft...\n";
    statusEl.textContent = "Erzeuge Excel...";

    try {
      let rows = [];

      for (const f of selectedFiles) {
        const html = fileCache.get(f.name) ?? await readFileSmart(f);
        const r = parseLog(html);

        if (addFilename.checked) r.forEach(x => x.Datei = f.name);
        rows.push(...r);
      }

      rows.sort((a,b)=>toMs(a.Datum,a.Zeit) - toMs(b.Datum,b.Zeit));

      addSeconds(rows);
      const results = buildResults(rows);

      rows.forEach(r => { r.Datum = formatDate(r.Datum); });

      const ws1 = XLSX.utils.json_to_sheet(rows);
      const ws2 = XLSX.utils.json_to_sheet(results);

      const cols1 = [];
      if (addFilename.checked) cols1.push({ wch: 30 });
      cols1.push({ wch: 12 }, { wch: 14 }, { wch: 110 }, { wch: 26 });
      ws1["!cols"] = cols1;
      ws2["!cols"] = [{ wch: 22 }, { wch: 22 }, { wch: 40 }, { wch: 16 }];

      highlightBadRows(ws2, results, THRESHOLD_SECONDS);

      const today = new Date();
      const dateStr = today.toISOString().slice(0,10).replace(/-/g,"");
      const statsRows = buildStats(results, rows, dateStr, anlagenName);
      const ws3 = XLSX.utils.json_to_sheet(statsRows);
      ws3["!cols"] = [{ wch: 42 }, { wch: 60 }];

      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws1, "Daten");
      XLSX.utils.book_append_sheet(wb, ws2, "Ergebnisse");
      XLSX.utils.book_append_sheet(wb, ws3, "Statistik");

      const outName = `${dateStr}_${anlagenName}_Ausschaltabschnitt1.xlsx`;

      XLSX.writeFile(wb, outName);

      statusEl.textContent = "Auswertung erzeugt.";
      logEl.textContent += `✓ Excel erstellt: ${outName}\n`;

    } catch (e) {
      console.error(e);
      statusEl.textContent = "Fehler beim Export (Konsole).";
      logEl.textContent += `\nFehler: ${e?.message || e}\n`;
    }
  });
</script>

</body>
</html>
