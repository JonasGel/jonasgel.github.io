<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SIMIS Analyse</title>

<style>
  body{font-family:system-ui;max-width:900px;margin:auto;padding:30px}
  .card{border:1px solid #ddd;border-radius:12px;padding:20px}
  .row{display:flex;gap:12px;margin-top:12px;flex-wrap:wrap}
  button{padding:10px;border-radius:8px}
  pre{background:#f7f7f7;padding:10px;border-radius:8px}
  .footer{text-align:center;margin-top:20px;color:#777}
</style>
</head>

<body>

<h1>SIMIS Analyse</h1>
<p>Bitte alle für die Auswertung relevanten Dimotools Protokolle auswählen.</p>

<div class="card">
<input id="files" type="file" multiple>
<div class="row">
<label><input type="checkbox" id="addFilename" checked> Dateiname-Spalte hinzufügen</label>
</div>
<div class="row">
<button id="build" disabled>Auswertung erzeugen</button>
<span id="status"></span>
</div>

<h3>Log</h3>
<pre id="log"></pre>
</div>

<div class="footer">Copyright Jonas Gelhaus 2026</div>

<script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>

<script>
const fileInput=document.getElementById("files")
const buildBtn=document.getElementById("build")
const logEl=document.getElementById("log")
const statusEl=document.getElementById("status")
const addFilename=document.getElementById("addFilename")

let selectedFiles=[]
const cache=new Map()
let anlagenName="SIMIS"

const THRESHOLD=240
const START="031/05 HP-Schnittstelle 1: Einschaltung"
const END="001/02 Ausschaltabschnitt 1: Befahren"
const BUE="023/01 FÜ-Schnittstelle meldet 'BÜ Eingeschaltet'"

function read(file){
return new Promise((res,rej)=>{
const r=new FileReader()
r.onload=()=>{
const buf=r.result
const t=new TextDecoder("utf-8").decode(buf)
if(t.includes("Ã")) res(new TextDecoder("windows-1252").decode(buf))
else res(t)
}
r.onerror=()=>rej(r.error)
r.readAsArrayBuffer(file)
})
}

const M={Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11}

function ms(d,z){
const dm=/(\d{2})\.([A-Za-z]{3})\.(\d{2})/.exec(d)
const tm=/(\d{2}):(\d{2}):(\d{2})\.(\d{3})/.exec(z)
if(!dm||!tm)return NaN
return Date.UTC(2000+dm[3],M[dm[2]],dm[1],tm[1],tm[2],tm[3],tm[4])
}

function fmt(d){
const m=/(\d{2})\.([A-Za-z]{3})\.(\d{2})/.exec(d)
const mm={Jan:"01",Feb:"02",Mar:"03",Apr:"04",May:"05",Jun:"06",Jul:"07",Aug:"08",Sep:"09",Oct:"10",Nov:"11",Dec:"12"}
return `${m[1]}.${mm[m[2]]}.20${m[3]}`
}

function parse(t,f){

const header=/Anlage:\s*([^\n\r<]+)/.exec(t)
if(header) anlagenName=header[1].replace(/_BR_.*/,"").replace(/GPS.*/,"").trim()

const re=new RegExp("(\\d{2}\\.[A-Za-z]{3}\\.\\d{2})\\s+(\\d{2}:\\d{2}:\\d{2}\\.\\d{3})\\s+([\\s\\S]*?)(?=\\s*\\d{2}\\.|$)","g")

let out=[],m
while(m=re.exec(t)){

let e=m[3].replace(/<br.*?>/gi," ").replace(/\s+/g," ").trim()
if(e.includes("SIEMENS"))continue

out.push({Datum:m[1],Zeit:m[2],Ereignis:e,Datei:f})

}
return out
}

function buildResults(rows){

let start=null
let res=[]

rows.forEach(r=>{

const t=ms(r.Datum,r.Zeit)
if(!Number.isFinite(t))return

if(r.Ereignis.includes(START)){
start=r
return
}

if(start && r.Ereignis.includes(END)){

const diff=(t-ms(start.Datum,start.Zeit))/1000

res.push({
"Startsignal":`${fmt(start.Datum)} ${start.Zeit}`,
"Ausschaltung":`${fmt(r.Datum)} ${r.Zeit}`,
"Dauer Sekunden":+diff.toFixed(3),
"Datei":r.Datei||""
})

start=null
}

})

return res
}

function stats(results,rows,date){

const hp=rows.filter(r=>r.Ereignis.includes(START)).length
const total=rows.filter(r=>r.Ereignis.includes(START)||r.Ereignis.includes(BUE)).length

const d=results.map(x=>x["Dauer Sekunden"])
const bad=d.filter(x=>x>THRESHOLD).length
const good=d.length-bad

const avg=d.reduce((a,b)=>a+b,0)/d.length
const min=Math.min(...d)
const max=Math.max(...d)

return [
{Kennzahl:"Datum",Wert:date},
{Kennzahl:"Anlage",Wert:anlagenName},
{Kennzahl:"Startsignal",Wert:START},
{Kennzahl:"Endsignal",Wert:END},
{Kennzahl:"Schwellwert",Wert:THRESHOLD},
{Kennzahl:"Einschaltungen Gesamt",Wert:total},
{Kennzahl:"Einschaltungen HP-Schnittstelle",Wert:hp},
{Kennzahl:">240 sec",Wert:bad},
{Kennzahl:"<=240 sec",Wert:good},
{Kennzahl:"Mittelwert",Wert:+avg.toFixed(3)},
{Kennzahl:"Minimum",Wert:+min.toFixed(3)},
{Kennzahl:"Maximum",Wert:+max.toFixed(3)}
]

}

fileInput.onchange=async()=>{

selectedFiles=[...fileInput.files]
cache.clear()
logEl.textContent=""

for(const f of selectedFiles){
const t=await read(f)
cache.set(f.name,t)
const r=parse(t,f.name)
logEl.textContent+=`✓ ${f.name} (${r.length})\n`
}

buildBtn.disabled=false
}

buildBtn.onclick=async()=>{

let rows=[]
for(const f of selectedFiles){
rows.push(...parse(cache.get(f.name),f.name))
}

rows.sort((a,b)=>ms(a.Datum,a.Zeit)-ms(b.Datum,b.Zeit))

const results=buildResults(rows)

const ws2=XLSX.utils.json_to_sheet(results)

results.forEach((r,i)=>{
if(r["Dauer Sekunden"]>THRESHOLD){
for(let c=0;c<4;c++){
const cell=XLSX.utils.encode_cell({r:i+1,c})
if(ws2[cell]) ws2[cell].s={fill:{fgColor:{rgb:"FFF2CC"}}}
}
}
})

const date=new Date().toISOString().slice(0,10).replace(/-/g,"")
const ws3=XLSX.utils.json_to_sheet(stats(results,rows,date))

const wb=XLSX.utils.book_new()
XLSX.utils.book_append_sheet(wb,ws2,"Ergebnisse")
XLSX.utils.book_append_sheet(wb,ws3,"Statistik")

XLSX.writeFile(wb,`${date}_${anlagenName}.xlsx`)
}

</script>
</body>
</html>
