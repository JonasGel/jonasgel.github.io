<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>HTML → Excel Log Parser</title>

<style>
body{
  font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  padding:24px;
  max-width:1000px;
  margin:auto;
}

.card{
  border:1px solid #ddd;
  border-radius:14px;
  padding:16px;
}

button{
  padding:10px 14px;
  border-radius:10px;
  border:1px solid #ccc;
  background:#fff;
  cursor:pointer;
}

button:disabled{
  opacity:.5;
  cursor:not-allowed;
}

pre{
  background:#f7f7f7;
  padding:12px;
  border-radius:10px;
  overflow:auto;
  max-height:300px;
}

.row{
  display:flex;
  gap:12px;
  align-items:center;
  flex-wrap:wrap;
}
</style>
</head>

<body>

<h1>HTML Log → Excel</h1>

<div class="card">

<div class="row">
<input id="files" type="file" multiple accept=".html,.htm">
<button id="build" disabled>Excel erzeugen</button>
<span id="status"></span>
</div>

<div style="margin-top:10px;">
<label>
<input id="addFilename" type="checkbox" checked>
Dateiname als Spalte hinzufügen
</label>
</div>

<h3>Log</h3>
<pre id="log"></pre>

</div>


<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<script>

const fileInput=document.getElementById("files")
const buildBtn=document.getElementById("build")
const logEl=document.getElementById("log")
const statusEl=document.getElementById("status")
const addFilenameEl=document.getElementById("addFilename")

let selectedFiles=[]


fileInput.addEventListener("change",()=>{
selectedFiles=Array.from(fileInput.files||[])
buildBtn.disabled=!selectedFiles.length

logEl.textContent=selectedFiles.map(f=>"- "+f.name).join("\n")
})


/* -------------------------------------------------
   Encoding detection (fix für Ü / ü / ä / ö)
-------------------------------------------------- */

function readFileSmart(file){

return new Promise((resolve,reject)=>{

const reader=new FileReader()

reader.onload=()=>{

try{

const buffer=reader.result

const utf8=new TextDecoder("utf-8",{fatal:false}).decode(buffer)

const replacement=(utf8.match(/\uFFFD/g)||[]).length
const mojibake=/Ã.|Â./.test(utf8)

if(replacement>0||mojibake){

const win=new TextDecoder("windows-1252",{fatal:false}).decode(buffer)

const winRep=(win.match(/\uFFFD/g)||[]).length
const winMoj=/Ã.|Â./.test(win)

if(winRep<replacement&&!winMoj){
resolve(win)
return
}

resolve(win)
return
}

resolve(utf8)

}catch(e){
reject(e)
}

}

reader.onerror=()=>reject(reader.error)

reader.readAsArrayBuffer(file)

})

}


/* -------------------------------------------------
   HTML -> Text normalisieren
-------------------------------------------------- */

function normalizeText(doc){

let text=doc.body?doc.body.innerText:""

text=text.replace(/[\x00-\x08\x0B\x0C\x0E-\x1F]/g,"")

text=text.replace(/\r/g,"\n")

text=text.replace(/[ \t]+/g," ")

text=text.replace(/\n{3,}/g,"\n\n")

return text.trim()

}


/* -------------------------------------------------
   Logzeilen extrahieren
-------------------------------------------------- */

function parseLog(text){

const ts=`(\\d{2}\\.[A-Za-z]{3}\\.\\d{2})\\s+(\\d{2}:\\d{2}:\\d{2}\\.\\d{3})`

const regex=new RegExp(
ts+"\\s+([\\s\\S]*?)(?=\\s*"+ts+"|\\s*$)",
"g"
)

const rows=[]
let m

while((m=regex.exec(text))!==null){

let datum=m[1]
let zeit=m[2]
let ereignis=m[3]||""

ereignis=ereignis
.replace(/\s*\n\s*/g," ")
.replace(/\s{2,}/g," ")
.trim()

if(!ereignis) continue

rows.push({
Datum:datum,
Zeit:zeit,
Ereignis:ereignis
})

}

return rows

}


/* -------------------------------------------------
   HTML verarbeiten
-------------------------------------------------- */

function extractRows(html,filename){

const doc=new DOMParser().parseFromString(html,"text/html")

const text=normalizeText(doc)

let rows=parseLog(text)

if(addFilenameEl.checked){
rows=rows.map(r=>({Datei:filename,...r}))
}

return rows

}


/* -------------------------------------------------
   Excel erzeugen
-------------------------------------------------- */

buildBtn.addEventListener("click",async()=>{

buildBtn.disabled=true
statusEl.textContent="Verarbeite..."

logEl.textContent=""

try{

const allRows=[]
let total=0

for(const file of selectedFiles){

const html=await readFileSmart(file)

const rows=extractRows(html,file.name)

allRows.push(...rows)

total+=rows.length

logEl.textContent+="OK: "+file.name+" -> "+rows.length+" Zeilen\n"

}

if(!allRows.length){

statusEl.textContent="Keine Logzeilen gefunden"

buildBtn.disabled=false
return

}


/* Sortieren */

allRows.sort((a,b)=>{

const da=(a.Datum||"")+" "+(a.Zeit||"")
const db=(b.Datum||"")+" "+(b.Zeit||"")

return da.localeCompare(db)

})


/* Excel */

const ws=XLSX.utils.json_to_sheet(allRows)

ws["!cols"]=[
{wch:25},
{wch:12},
{wch:14},
{wch:120}
]

const wb=XLSX.utils.book_new()

XLSX.utils.book_append_sheet(wb,ws,"Daten")

const filename="log_export.xlsx"

XLSX.writeFile(wb,filename)

statusEl.textContent="Fertig ("+total+" Zeilen)"

}catch(err){

console.error(err)

statusEl.textContent="Fehler"

}

buildBtn.disabled=false

})

</script>

</body>
</html>
