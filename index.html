<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<title>SIMIS Analyse</title>

<style>
body{font-family:system-ui;max-width:900px;margin:auto;padding:30px}
.card{border:1px solid #ddd;border-radius:12px;padding:20px}
.row{margin-top:10px}
button{padding:10px;border-radius:8px}
pre{background:#f7f7f7;padding:10px}
.footer{text-align:center;margin-top:20px;color:#777}
</style>
</head>

<body>

<h1>SIMIS Analyse</h1>
<p>Bitte alle relevanten Dimotools Protokolle auswählen.</p>

<div class="card">
<input id="files" type="file" multiple>

<div class="row">
<select id="kontaktSelect"></select>
</div>

<div class="row">
<button id="build">Auswertung erzeugen</button>
</div>

<pre id="log"></pre>
</div>

<div class="footer">Copyright Jonas Gelhaus 2026</div>

<script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>

<script>

const THRESHOLD=240

const fileInput=document.getElementById("files")
const kontaktSelect=document.getElementById("kontaktSelect")
const logEl=document.getElementById("log")

let cache=new Map()
let anlagenName="SIMIS"

/* Parser */
function parse(t){

const ts=`(\\d{2}\\.[A-Za-z]{3}\\.\\d{2})\\s+(\\d{2}:\\d{2}:\\d{2}\\.\\d{3})`
const re=new RegExp(ts+"\\s+([\\s\\S]*?)(?=\\s*"+ts+"|$)","g")

let out=[],m

while(m=re.exec(t)){

let e=m[3].replace(/<br\s*\/?>/gi," ").replace(/\s+/g," ").trim()

if(e.includes("SIEMENS"))continue

out.push({Datum:m[1],Zeit:m[2],Ereignis:e})

}

return out
}

/* Zeit */
const M={Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11}

function ms(d,z){
const dm=/(\d{2})\.([A-Za-z]{3})\.(\d{2})/.exec(d)
const tm=/(\d{2}):(\d{2}):(\d{2})\.(\d{3})/.exec(z)
return Date.UTC(2000+dm[3],M[dm[2]],dm[1],tm[1],tm[2],tm[3],tm[4])
}

/* Kontakte */
function find(rows){

const s=new Set()

rows.forEach(r=>{
let m=/TVD:(\d+)/.exec(r.Ereignis)
if(m)s.add("TVD:"+m[1])
m=/Abschnitt:\s*(\d+)/.exec(r.Ereignis)
if(m)s.add("ABS:"+m[1])
})

return [...s]
}

/* Regex */
function getRe(k){

const [t,id]=k.split(":")

if(t==="TVD")return new RegExp(`TVD:${id}.*Achsen.*(\\d+)`)
return new RegExp(`Abschnitt:\\s*${id}.*Achsen.*(\\d+)`)
}

/* Ergebnisse */
function build(rows,k){

const re=getRe(k)

let start=null
let einschaltungen=0
let res=[]

rows.forEach(r=>{

if(r.Ereignis.includes("Gelb anschalten")){
start=r
einschaltungen=0
}

/* Einschaltungen zählen */
if(r.Ereignis.includes("Einschaltung")){
if(r.Ereignis.includes("HP")||r.Ereignis.includes("FÜ")){
einschaltungen++
}
}

if(start){

const m=re.exec(r.Ereignis)

if(m){

const diff=(ms(r.Datum,r.Zeit)-ms(start.Datum,start.Zeit))/1000

res.push({
Start:start.Zeit,
Ende:r.Zeit,
"Dauer Sekunden":+diff.toFixed(3),
error:einschaltungen>1
})

start=null

}

}

})

return res
}

/* Styling */
function style(ws,data){

data.forEach((r,i)=>{

let style=null

if(r.error){
style={fill:{fgColor:{rgb:"FF9999"}}} // rot
}else if(r["Dauer Sekunden"]>THRESHOLD){
style={fill:{fgColor:{rgb:"FFF2CC"}}} // gelb
}

if(style){
for(let c=0;c<4;c++){
const cell=XLSX.utils.encode_cell({r:i+1,c})
if(ws[cell])ws[cell].s=style
}
}

})

}

/* UI */
fileInput.onchange=async()=>{

let all=[]
logEl.textContent="Lade...\n"

for(const f of fileInput.files){

const t=await f.text()
cache.set(f.name,t)

const r=parse(t)
all.push(...r)

}

const k=find(all)

kontaktSelect.innerHTML=""

k.forEach(x=>{
const o=document.createElement("option")
o.value=x
o.textContent=x
kontaktSelect.appendChild(o)
})

logEl.textContent+="Kontakte: "+k.join(", ")

}

/* Export */
build.onclick=async()=>{

let rows=[]

for(const f of fileInput.files){
rows.push(...parse(cache.get(f.name)))
}

rows.sort((a,b)=>ms(a.Datum,a.Zeit)-ms(b.Datum,b.Zeit))

const k=kontaktSelect.value

const res=build(rows,k)

const ws=XLSX.utils.json_to_sheet(res)

style(ws,res)

const wb=XLSX.utils.book_new()
XLSX.utils.book_append_sheet(wb,ws,"Ergebnisse")

XLSX.writeFile(wb,"simis.xlsx")

}

</script>
</body>
</html>
