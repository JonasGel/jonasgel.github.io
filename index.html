<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>HTML Log → Excel Analyse</title>

<style>
body{
font-family:system-ui,Segoe UI,Roboto,sans-serif;
padding:24px;
max-width:1100px;
margin:auto;
}

.card{
border:1px solid #ddd;
border-radius:14px;
padding:16px;
}

.row{
display:flex;
gap:12px;
align-items:center;
flex-wrap:wrap;
}

button{
padding:10px 14px;
border-radius:10px;
border:1px solid #ccc;
background:white;
cursor:pointer;
}

button:disabled{
opacity:.5;
cursor:not-allowed;
}

select{
padding:8px 10px;
border-radius:10px;
border:1px solid #ccc;
}

pre{
background:#f7f7f7;
padding:12px;
border-radius:10px;
overflow:auto;
max-height:320px;
}

.muted{color:#666;font-size:14px;}
</style>
</head>

<body>

<h1>Bahnübergang Log → Excel Analyse</h1>

<div class="card">

<div class="row">
<input id="files" type="file" multiple accept=".html,.htm">
<button id="build" disabled>Excel erzeugen</button>
<span id="status"></span>
</div>

<div class="row" style="margin-top:10px;">
<label>
<input id="addFilename" type="checkbox" checked>
Dateiname-Spalte hinzufügen
</label>

<label>
TVD Kontakt:
<select id="tvdSelect" disabled></select>
</label>
</div>

<h3>Log</h3>
<pre id="log"></pre>

</div>


<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<script>

const fileInput=document.getElementById("files")
const buildBtn=document.getElementById("build")
const logEl=document.getElementById("log")
const statusEl=document.getElementById("status")
const tvdSelect=document.getElementById("tvdSelect")
const addFilename=document.getElementById("addFilename")

let selectedFiles=[]
const fileCache=new Map()


/* ---------------------------
Encoding fix
--------------------------- */

function readFileSmart(file){

return new Promise((resolve,reject)=>{

const r=new FileReader()

r.onload=()=>{

const buf=r.result

const utf8=new TextDecoder("utf-8").decode(buf)

if(utf8.includes("Ã")||utf8.includes("�")){
resolve(new TextDecoder("windows-1252").decode(buf))
}else{
resolve(utf8)
}

}

r.onerror=()=>reject(r.error)

r.readAsArrayBuffer(file)

})

}


/* ---------------------------
HTML -> Text
--------------------------- */

function normalizeText(doc){

let t=doc.body?doc.body.innerText:""

t=t.replace(/\r/g,"\n")
t=t.replace(/[ \t]+/g," ")

return t.trim()

}


/* ---------------------------
Log Parser
--------------------------- */

function parseLog(text){

const ts=`(\\d{2}\\.[A-Za-z]{3}\\.\\d{2})\\s+(\\d{2}:\\d{2}:\\d{2}\\.\\d{3})`

const re=new RegExp(ts+"\\s+([\\s\\S]*?)(?=\\s*"+ts+"|\\s*$)","g")

const rows=[]
let m

while((m=re.exec(text))!==null){

let datum=m[1]
let zeit=m[2]
let ereignis=m[3]

ereignis=ereignis.replace(/\s*\n\s*/g," ").trim()

rows.push({Datum:datum,Zeit:zeit,Ereignis:ereignis})

}

return rows

}


/* ---------------------------
Zeit -> ms
--------------------------- */

const MONTH={
Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,
Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11
}

function toMs(d,z){

const dm=/(\d{2})\.([A-Za-z]{3})\.(\d{2})/.exec(d)
const tm=/(\d{2}):(\d{2}):(\d{2})\.(\d{3})/.exec(z)

if(!dm||!tm)return NaN

return Date.UTC(
2000+Number(dm[3]),
MONTH[dm[2]],
Number(dm[1]),
Number(tm[1]),
Number(tm[2]),
Number(tm[3]),
Number(tm[4])
)

}


/* ---------------------------
TVD finden
--------------------------- */

function findTvd(rows){

const set=new Set()

rows.forEach(r=>{
const m=/ECAC:\s*\(TVD:(\d+)\)/.exec(r.Ereignis)
if(m)set.add(m[1])
})

return [...set].sort((a,b)=>a-b)

}


/* ---------------------------
Zeitmessung
--------------------------- */

function addSeconds(rows,tvd){

const start="Lichtgruppe 1: Gelb anschalten"
const re=new RegExp(`ECAC:\\s*\\(TVD:${tvd}\\)\\s*Achsen im Abschnitt:\\s*(\\d+)`)

let startTime=null

rows.forEach(r=>{

r["Sekunden (Gelb→Achsen)"]=""

const ms=toMs(r.Datum,r.Zeit)

if(r.Ereignis.includes(start)){
startTime=ms
}

if(startTime){

const m=re.exec(r.Ereignis)

if(m){

const diff=(ms-startTime)/1000

r["Sekunden (Gelb→Achsen)"]=Number(diff.toFixed(3))

startTime=null

}

}

})

}


/* ---------------------------
Ergebnisliste
--------------------------- */

function buildResults(rows,tvd){

const start="Lichtgruppe 1: Gelb anschalten"
const re=new RegExp(`ECAC:\\s*\\(TVD:${tvd}\\)\\s*Achsen im Abschnitt:\\s*(\\d+)`)

let startRow=null

const results=[]

rows.forEach(r=>{

const ms=toMs(r.Datum,r.Zeit)

if(r.Ereignis.includes(start)){
startRow=r
}

if(startRow){

const m=re.exec(r.Ereignis)

if(m){

const diff=(ms-toMs(startRow.Datum,startRow.Zeit))/1000

results.push({
"Start Gelb":startRow.Datum+" "+startRow.Zeit,
"Achsenzeit":r.Datum+" "+r.Zeit,
"TVD":"TVD:"+tvd,
"Achsenwert":Number(m[1]),
"Dauer Sekunden":Number(diff.toFixed(3))
})

startRow=null

}

}

})

return results

}


/* ---------------------------
Dateien laden
--------------------------- */

fileInput.addEventListener("change",async()=>{

selectedFiles=[...fileInput.files]

buildBtn.disabled=true
fileCache.clear()

let allRows=[]

for(const f of selectedFiles){

const html=await readFileSmart(f)

fileCache.set(f.name,html)

const rows=parseLog(normalizeText(
new DOMParser().parseFromString(html,"text/html")
))

allRows.push(...rows)

}

const tvds=findTvd(allRows)

tvdSelect.innerHTML=""

tvds.forEach(v=>{
const o=document.createElement("option")
o.value=v
o.textContent="TVD:"+v
tvdSelect.appendChild(o)
})

tvdSelect.disabled=!tvds.length
buildBtn.disabled=false

})


/* ---------------------------
Excel Export
--------------------------- */

buildBtn.addEventListener("click",async()=>{

let rows=[]

for(const f of selectedFiles){

const html=fileCache.get(f.name)

const r=parseLog(normalizeText(
new DOMParser().parseFromString(html,"text/html")
))

if(addFilename.checked){
r.forEach(x=>x.Datei=f.name)
}

rows.push(...r)

}

rows.sort((a,b)=>toMs(a.Datum,a.Zeit)-toMs(b.Datum,b.Zeit))

const tvd=tvdSelect.value

addSeconds(rows,tvd)

const results=buildResults(rows,tvd)

/* Statistik */

if(results.length){

const d=results.map(r=>r["Dauer Sekunden"])

const avg=d.reduce((a,b)=>a+b)/d.length
const min=Math.min(...d)
const max=Math.max(...d)

results.push({})
results.push({ "Start Gelb":"Statistik"})
results.push({ "Start Gelb":"Anzahl","Achsenzeit":d.length})
results.push({ "Start Gelb":"Mittelwert","Achsenzeit":avg})
results.push({ "Start Gelb":"Minimum","Achsenzeit":min})
results.push({ "Start Gelb":"Maximum","Achsenzeit":max})

}


/* Excel */

const ws1=XLSX.utils.json_to_sheet(rows)
const ws2=XLSX.utils.json_to_sheet(results)

const wb=XLSX.utils.book_new()

XLSX.utils.book_append_sheet(wb,ws1,"Daten")
XLSX.utils.book_append_sheet(wb,ws2,"Ergebnisse")

XLSX.writeFile(wb,"bahnuebergang_auswertung.xlsx")

statusEl.textContent="Fertig"

})

</script>

</body>
</html>
