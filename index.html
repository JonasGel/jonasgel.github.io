<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SIMIS Analyse</title>

<style>
  body{font-family:system-ui;max-width:980px;margin:auto;padding:30px}
  .card{border:1px solid #ddd;border-radius:12px;padding:20px}
  .row{display:flex;gap:12px;margin-top:12px;flex-wrap:wrap;align-items:center}
  button{padding:10px 14px;border-radius:8px;cursor:pointer}
  pre{background:#f7f7f7;padding:10px;border-radius:8px;white-space:pre-wrap}
  .footer{text-align:center;margin-top:20px;color:#777}
  .muted{color:#666;font-size:.95rem}
</style>
</head>

<body>

<h1>SIMIS Analyse</h1>
<p>Bitte alle für die Auswertung relevanten Dimotools-Protokolle auswählen.</p>

<div class="card">
  <input id="files" type="file" multiple accept=".html,.htm">

  <div class="row">
    <label><input type="checkbox" id="addFilename" checked> Dateiname-Spalte hinzufügen</label>
  </div>

  <div class="row">
    <button id="build" disabled>Auswertung erzeugen</button>
    <span id="status" class="muted"></span>
  </div>

  <h3>Log</h3>
  <pre id="log"></pre>
</div>

<div class="footer">Copyright Jonas Gelhaus 2026</div>

<script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>

<script>
const fileInput = document.getElementById("files")
const buildBtn = document.getElementById("build")
const logEl = document.getElementById("log")
const statusEl = document.getElementById("status")
const addFilename = document.getElementById("addFilename")

let selectedFiles = []
const cache = new Map()

const THRESHOLD = 240
const START = "031/05 HP-Schnittstelle 1: Einschaltung"
const END_SIGNALS = [
  "001/02 Ausschaltabschnitt 1: Befahren",
  "031/00 HP-Schnittstelle 1: Ausschaltung"
]
const END_LABEL = END_SIGNALS.join(" / ")
const BUE = "023/01 FÜ-Schnittstelle meldet 'BÜ Eingeschaltet'"

const MONTHS = {
  Jan:0, Feb:1, Mar:2, Apr:3, May:4, Jun:5,
  Jul:6, Aug:7, Sep:8, Oct:9, Nov:10, Dec:11
}

const MONTHS_NUM = {
  Jan:"01", Feb:"02", Mar:"03", Apr:"04", May:"05", Jun:"06",
  Jul:"07", Aug:"08", Sep:"09", Oct:"10", Nov:"11", Dec:"12"
}

function log(msg){
  logEl.textContent += msg + "\n"
}

function setStatus(msg){
  statusEl.textContent = msg
}

function decodeBuffer(buf){
  const utf8 = new TextDecoder("utf-8", { fatal:false }).decode(buf)
  const suspicious = (utf8.match(/Ã|â€|â€“|â€œ|â€ž|ï¿½|�/g) || []).length
  if(suspicious >= 2){
    return new TextDecoder("windows-1252").decode(buf)
  }
  return utf8
}

function read(file){
  return new Promise((resolve, reject)=>{
    const r = new FileReader()
    r.onload = ()=> {
      try{
        resolve(decodeBuffer(r.result))
      }catch(err){
        reject(err)
      }
    }
    r.onerror = ()=> reject(r.error)
    r.readAsArrayBuffer(file)
  })
}

function cleanAnlagenName(raw){
  if(!raw) return "SIMIS"
  return raw
    .replace(/GPS.*/i, "")
    .replace(/_BR_.*/i, "")
    .replace(/\s+/g, " ")
    .trim()
}

function sanitizeFileName(name){
  return (name || "SIMIS")
    .replace(/[\\/:*?"<>|]+/g, "_")
    .replace(/\s+/g, "_")
}

function toMillis(datum, zeit){
  const dm = /(\d{2})\.([A-Za-z]{3})\.(\d{2})/.exec(datum)
  const tm = /(\d{2}):(\d{2}):(\d{2})\.(\d{3})/.exec(zeit)

  if(!dm || !tm) return NaN
  const year = 2000 + Number(dm[3])
  const month = MONTHS[dm[2]]
  if(month === undefined) return NaN

  return Date.UTC(
    year,
    month,
    Number(dm[1]),
    Number(tm[1]),
    Number(tm[2]),
    Number(tm[3]),
    Number(tm[4])
  )
}

function fmtDate(datum){
  const m = /(\d{2})\.([A-Za-z]{3})\.(\d{2})/.exec(datum)
  if(!m) return datum
  return `${m[1]}.${MONTHS_NUM[m[2]] || "??"}.20${m[3]}`
}

function fmtDateTime(datum, zeit){
  return `${fmtDate(datum)} ${zeit}`
}

function normalizeHtmlText(text){
  return text
    .replace(/<br\s*\/?>/gi, "\n")
    .replace(/<\/div>/gi, "\n")
    .replace(/<div[^>]*>/gi, " ")
    .replace(/<\/?center[^>]*>/gi, " ")
    .replace(/<\/?font[^>]*>/gi, " ")
    .replace(/<\/?b[^>]*>/gi, " ")
    .replace(/<\/?td[^>]*>/gi, " ")
    .replace(/<\/?tr[^>]*>/gi, " ")
    .replace(/<\/?table[^>]*>/gi, " ")
    .replace(/<\/?head[^>]*>/gi, " ")
    .replace(/<\/?body[^>]*>/gi, " ")
    .replace(/<\/?html[^>]*>/gi, " ")
    .replace(/<\/?style[^>]*>[\s\S]*?<\/style>/gi, " ")
    .replace(/<img[^>]*>/gi, " ")
    .replace(/<[^>]+>/g, " ")
}

function extractAnlage(text){
  const m = /Anlage:\s*([^\n\r<]+)/i.exec(text)
  return cleanAnlagenName(m ? m[1] : "SIMIS")
}

function parse(text, filename){
  const anlage = extractAnlage(text)
  const cleaned = normalizeHtmlText(text)

  const re = /(\d{2}\.[A-Za-z]{3}\.\d{2})\s+(\d{2}:\d{2}:\d{2}\.\d{3})\s+([\s\S]*?)(?=(?:\s*\d{2}\.[A-Za-z]{3}\.\d{2}\s+\d{2}:\d{2}:\d{2}\.\d{3}\s+)|$)/g

  const rows = []
  let m

  while((m = re.exec(cleaned)) !== null){
    let ereignis = m[3]
      .replace(/\u0000/g, " ")
      .replace(/\s+/g, " ")
      .trim()

    if(!ereignis) continue
    if(/SIEMENS AG/i.test(ereignis)) continue
    if(/Transportation Systems\. Copyright/i.test(ereignis)) continue

    rows.push({
      Datum: m[1],
      Zeit: m[2],
      Ereignis: ereignis,
      Datei: filename,
      Anlage: anlage
    })
  }

  return rows
}

function isEndSignal(ereignis){
  return END_SIGNALS.some(signal => ereignis.includes(signal))
}

function buildResults(rows){
  const openStarts = []
  const results = []

  for(const row of rows){
    const currentMs = toMillis(row.Datum, row.Zeit)
    if(!Number.isFinite(currentMs)) continue

    if(row.Ereignis.includes(START)){
      openStarts.push(row)
      continue
    }

    if(isEndSignal(row.Ereignis) && openStarts.length){
      const start = openStarts.shift()
      const diff = (currentMs - toMillis(start.Datum, start.Zeit)) / 1000

      const item = {
        "Startsignal": fmtDateTime(start.Datum, start.Zeit),
        "Ausschaltung": fmtDateTime(row.Datum, row.Zeit),
        "Dauer Sekunden": Number(diff.toFixed(3))
      }

      if(addFilename.checked){
        item["Datei"] = row.Datei || ""
      }

      results.push(item)
    }
  }

  return { results, offeneStarts: openStarts }
}

function buildStatsForAnlage(results, rows, auswertungsDatum, anlage){
  const hpCount = rows.filter(r => r.Ereignis.includes(START)).length
  const totalCount = rows.filter(r =>
    r.Ereignis.includes(START) || r.Ereignis.includes(BUE)
  ).length

  const durations = results.map(r => r["Dauer Sekunden"])
  const over = durations.filter(v => v > THRESHOLD).length
  const underOrEqual = durations.filter(v => v <= THRESHOLD).length

  const avg = durations.length
    ? Number((durations.reduce((a,b)=>a+b,0) / durations.length).toFixed(3))
    : ""

  const min = durations.length
    ? Number(Math.min(...durations).toFixed(3))
    : ""

  const max = durations.length
    ? Number(Math.max(...durations).toFixed(3))
    : ""

  return {
    "Datum": auswertungsDatum,
    "Anlage": anlage,
    "Startsignal": START,
    "Endsignal": END_LABEL,
    "Schwellwert (240s)": THRESHOLD,
    "Einschaltungen Gesamt (HP + FÜ)": totalCount,
    "Einschaltungen HP-Schnittstelle": hpCount,
    "> 240 sec": over,
    "<=240 sec": underOrEqual,
    "Mittelwert": avg,
    "Minimum": min,
    "Maximum": max
  }
}

function buildStatsSheetRows(statsByAnlage){
  const labels = [
    "Datum",
    "Anlage",
    "Startsignal",
    "Endsignal",
    "Schwellwert (240s)",
    "Einschaltungen Gesamt (HP + FÜ)",
    "Einschaltungen HP-Schnittstelle",
    "> 240 sec",
    "<=240 sec",
    "Mittelwert",
    "Minimum",
    "Maximum"
  ]

  return labels.map(label => {
    const row = { "Kennzahl": label }
    statsByAnlage.forEach((stats, index) => {
      const colName = stats["Anlage"] || `Anlage ${index + 1}`
      row[colName] = stats[label]
    })
    return row
  })
}

function autoWidth(ws, data){
  if(!data || !data.length) return

  const headers = Object.keys(data[0])
  const widths = headers.map(h => ({ wch: Math.max(12, String(h).length + 2) }))

  data.forEach(row => {
    headers.forEach((h, i) => {
      const len = String(row[h] ?? "").length + 2
      if(len > widths[i].wch) widths[i].wch = Math.min(len, 80)
    })
  })

  ws["!cols"] = widths
}

function styleHeader(ws, headers){
  headers.forEach((_, c) => {
    const cell = XLSX.utils.encode_cell({ r:0, c })
    if(ws[cell]){
      ws[cell].s = {
        font: { bold:true },
        fill: { fgColor:{ rgb:"D9EAF7" } },
        alignment: { horizontal:"center", vertical:"center" }
      }
    }
  })
}

fileInput.onchange = async () => {
  selectedFiles = [...fileInput.files]
  cache.clear()
  logEl.textContent = ""
  buildBtn.disabled = true

  if(!selectedFiles.length){
    setStatus("")
    return
  }

  setStatus("Dateien werden eingelesen ...")

  try{
    for(const f of selectedFiles){
      const text = await read(f)
      cache.set(f.name, text)

      const parsed = parse(text, f.name)
      const anlage = parsed[0]?.Anlage || extractAnlage(text)

      log(`✓ ${f.name} (${parsed.length} Ereignisse) – Anlage: ${anlage}`)
    }

    buildBtn.disabled = false
    setStatus(`${selectedFiles.length} Datei(en) bereit`)
  }catch(err){
    console.error(err)
    setStatus("Fehler beim Einlesen")
    log("Fehler beim Einlesen: " + (err?.message || err))
  }
}

buildBtn.onclick = async () => {
  try{
    if(!selectedFiles.length) return

    setStatus("Auswertung läuft ...")
    logEl.textContent = ""

    let rows = []
    const anlagenSet = new Set()

    for(const f of selectedFiles){
      const text = cache.get(f.name)
      const parsed = parse(text, f.name)
      rows.push(...parsed)

      if(parsed[0]?.Anlage) anlagenSet.add(parsed[0].Anlage)
      log(`✓ ${f.name}: ${parsed.length} Ereignisse geparst`)
    }

    rows.sort((a,b) => toMillis(a.Datum, a.Zeit) - toMillis(b.Datum, b.Zeit))

    const rawRows = rows.length ? rows.map(r => ({
      "Datum": fmtDate(r.Datum),
      "Zeit": r.Zeit,
      "Ereignis": r.Ereignis,
      "Datei": r.Datei,
      "Anlage": r.Anlage
    })) : [{
      "Datum": "",
      "Zeit": "",
      "Ereignis": "",
      "Datei": "",
      "Anlage": ""
    }]

    const anlage = [...anlagenSet][0] || "SIMIS"
    const { results, offeneStarts } = buildResults(rows)

    const today = new Date()
    const yyyy = today.getFullYear()
    const mm = String(today.getMonth() + 1).padStart(2, "0")
    const dd = String(today.getDate()).padStart(2, "0")
    const exportDate = `${yyyy}${mm}${dd}`

    const resultRows = results.length ? results : [
      addFilename.checked
        ? { "Startsignal":"", "Ausschaltung":"", "Dauer Sekunden":"", "Datei":"" }
        : { "Startsignal":"", "Ausschaltung":"", "Dauer Sekunden":"" }
    ]

    const uniqueAnlagen = [...new Set(rows.map(r => r.Anlage).filter(Boolean))]

    const statsByAnlage = uniqueAnlagen.length
      ? uniqueAnlagen.map(anl => {
          const rowsForAnlage = rows.filter(r => r.Anlage === anl)
          const rowsForAnlageSorted = [...rowsForAnlage].sort((a,b) => toMillis(a.Datum, a.Zeit) - toMillis(b.Datum, b.Zeit))
          const resultsForAnlage = buildResults(rowsForAnlageSorted).results
          return buildStatsForAnlage(resultsForAnlage, rowsForAnlageSorted, exportDate, anl)
        })
      : [buildStatsForAnlage([], [], exportDate, "SIMIS")]

    const statRows = buildStatsSheetRows(statsByAnlage)

    const wsRaw = XLSX.utils.json_to_sheet(rawRows)
    const wsResults = XLSX.utils.json_to_sheet(resultRows)
    const wsStats = XLSX.utils.json_to_sheet(statRows)

    styleHeader(wsRaw, Object.keys(rawRows[0]))
    styleHeader(wsResults, Object.keys(resultRows[0]))
    styleHeader(wsStats, Object.keys(statRows[0]))

    if(results.length){
      results.forEach((r, i) => {
        if(r["Dauer Sekunden"] > THRESHOLD){
          const columnCount = Object.keys(r).length
          for(let c = 0; c < columnCount; c++){
            const cell = XLSX.utils.encode_cell({ r:i+1, c })
            if(wsResults[cell]){
              wsResults[cell].s = {
                fill: { fgColor:{ rgb:"FFF2CC" } }
              }
            }
          }
        }
      })
    }

    autoWidth(wsRaw, rawRows)
    autoWidth(wsResults, resultRows)
    autoWidth(wsStats, statRows)

    const wb = XLSX.utils.book_new()
    XLSX.utils.book_append_sheet(wb, wsRaw, "Rohdaten")
    XLSX.utils.book_append_sheet(wb, wsResults, "Ergebnisse")
    XLSX.utils.book_append_sheet(wb, wsStats, "Statistik")

    const safeAnlage = sanitizeFileName(anlage)
    XLSX.writeFile(wb, `${exportDate}_${safeAnlage}.xlsx`)

    const over240 = results.filter(r => r["Dauer Sekunden"] > THRESHOLD).length

    log(`Fertig: ${results.length} Treffer`)
    log(`Davon > ${THRESHOLD}s: ${over240}`)
    if(offeneStarts.length){
      log(`Hinweis: ${offeneStarts.length} Startsignal(e) ohne Endsignal gefunden`)
    }

    setStatus(`Excel erzeugt: ${results.length} Treffer, ${over240} über ${THRESHOLD}s`)
  }catch(err){
    console.error(err)
    setStatus("Fehler bei der Auswertung")
    log("Fehler: " + (err?.message || err))
  }
}
</script>
</body>
</html>
