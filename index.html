<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SIMIS Analyse</title>

<style>

body{
font-family:system-ui,Segoe UI,Roboto,sans-serif;
max-width:900px;
margin:auto;
padding:30px;
}

.card{
border:1px solid #ddd;
border-radius:12px;
padding:20px;
}

.row{
display:flex;
gap:12px;
flex-wrap:wrap;
align-items:center;
margin-top:12px;
}

button{
padding:10px 16px;
border-radius:10px;
border:1px solid #ccc;
background:white;
cursor:pointer;
}

button:disabled{
opacity:.5;
cursor:not-allowed;
}

pre{
background:#f7f7f7;
padding:12px;
border-radius:8px;
max-height:260px;
overflow:auto;
white-space:pre-wrap;
}

.footer{
margin-top:30px;
font-size:13px;
color:#777;
text-align:center;
}

</style>
</head>


<body>

<h1>SIMIS Analyse</h1>

<p>Bitte alle für die Auswertung relevanten Dimotools Protokolle auswählen.</p>

<div class="card">

<div class="row">
<input id="files" type="file" multiple accept=".html,.htm">
</div>

<div class="row">
<label>Erkannte Kontakte:</label>
<select id="tvdSelect" disabled></select>
</div>

<div class="row">
<label>
<input type="checkbox" id="addFilename" checked>
Dateiname-Spalte hinzufügen
</label>
</div>

<div class="row">
<button id="build" disabled>Auswertung erzeugen</button>
<span id="status"></span>
</div>

<h3>Log</h3>
<pre id="log"></pre>

</div>

<div class="footer">
Copyright Jonas Gelhaus 2026
</div>


<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<script>

const fileInput=document.getElementById("files")
const buildBtn=document.getElementById("build")
const tvdSelect=document.getElementById("tvdSelect")
const logEl=document.getElementById("log")
const statusEl=document.getElementById("status")
const addFilename=document.getElementById("addFilename")

let selectedFiles=[]
const fileCache=new Map()

let anlagenName="SIMIS"


/* Encoding */

function readFileSmart(file){

return new Promise((resolve,reject)=>{

const r=new FileReader()

r.onload=()=>{

const buf=r.result

const utf8=new TextDecoder("utf-8").decode(buf)

if(utf8.includes("Ã")||utf8.includes("�")){
resolve(new TextDecoder("windows-1252").decode(buf))
}else{
resolve(utf8)
}

}

r.onerror=()=>reject(r.error)

r.readAsArrayBuffer(file)

})

}


/* Zeitberechnung */

const MONTHIDX={
Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,
Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11
}

function toMs(d,z){

const dm=/(\d{2})\.([A-Za-z]{3})\.(\d{2})/.exec(d)
const tm=/(\d{2}):(\d{2}):(\d{2})\.(\d{3})/.exec(z)

if(!dm||!tm) return NaN

return Date.UTC(
2000+Number(dm[3]),
MONTHIDX[dm[2]],
Number(dm[1]),
Number(tm[1]),
Number(tm[2]),
Number(tm[3]),
Number(tm[4])
)

}


/* Datum Format */

const MONTH={
Jan:"01",Feb:"02",Mar:"03",Apr:"04",May:"05",Jun:"06",
Jul:"07",Aug:"08",Sep:"09",Oct:"10",Nov:"11",Dec:"12"
}

function formatDate(d){

const m=/(\d{2})\.([A-Za-z]{3})\.(\d{2})/.exec(d)

if(!m) return d

return `${m[1]}.${MONTH[m[2]]}.20${m[3]}`

}


/* Anlagenname säubern */

function sanitizeAnlageName(raw){

let name=raw.trim()

name=name.replace(/_BR_.*/i,"")
name=name.replace(/GPS-Position.*/i,"")
name=name.replace(/<[^>]*>/g,"")
name=name.replace(/\s+/g,"_")
name=name.replace(/[^\w\-,.]/g,"")

return name

}


/* Parser */

function parseLog(text){

const header=/Anlage:\s*([^\n\r]+)/.exec(text)

if(header){
anlagenName=sanitizeAnlageName(header[1])
}

const ts=`(\\d{2}\\.[A-Za-z]{3}\\.\\d{2})\\s+(\\d{2}:\\d{2}:\\d{2}\\.\\d{3})`
const re=new RegExp(ts+"\\s+([\\s\\S]*?)(?=\\s*"+ts+"|\\s*$)","g")

const rows=[]
let m

while((m=re.exec(text))!==null){

let ereignis=m[3]
.replace(/<br\s*\/?>/gi," ")
.replace(/\bBR\b/g," ")
.replace(/\s*\n\s*/g," ")
.replace(/\s{2,}/g," ")
.trim()

if(ereignis.includes("SIEMENS AG - Transportation Systems")) continue

rows.push({
Datum:m[1],
Zeit:m[2],
Ereignis:ereignis
})

}

return rows

}


/* Kontakte */

function findTvd(rows){

const set=new Set()

rows.forEach(r=>{
const m=/ECAC:\s*\(TVD:(\d+)\)/.exec(r.Ereignis)
if(m)set.add(m[1])
})

return [...set].sort((a,b)=>a-b)

}


/* Zeitmessung */

function addSeconds(rows,tvd){

const start="Lichtgruppe 1: Gelb anschalten"
const re=new RegExp(`ECAC:\\s*\\(TVD:${tvd}\\)\\s*Achsen im Abschnitt:\\s*(\\d+)`)

let startTime=null

rows.forEach(r=>{

r["Sekunden (Gelb→Achsen)"]=""

const ms=toMs(r.Datum,r.Zeit)

if(r.Ereignis.includes(start)){
startTime=ms
}

if(startTime){

const m=re.exec(r.Ereignis)

if(m){

r["Sekunden (Gelb→Achsen)"]=((ms-startTime)/1000).toFixed(3)

startTime=null

}

}

})

}


/* Ergebnisse */

function buildResults(rows,tvd){

const start="Lichtgruppe 1: Gelb anschalten"
const re=new RegExp(`ECAC:\\s*\\(TVD:${tvd}\\)\\s*Achsen im Abschnitt:\\s*(\\d+)`)

let startRow=null
const res=[]

rows.forEach(r=>{

const ms=toMs(r.Datum,r.Zeit)

if(r.Ereignis.includes(start)) startRow=r

if(startRow){

const m=re.exec(r.Ereignis)

if(m){

const diff=(ms-toMs(startRow.Datum,startRow.Zeit))/1000

res.push({
"Start Gelb":formatDate(startRow.Datum)+" "+startRow.Zeit,
"Achsenzeit":formatDate(r.Datum)+" "+r.Zeit,
"TVD":"TVD"+tvd,
"Achsenwert":m[1],
"Dauer Sekunden":diff.toFixed(3)
})

startRow=null

}

}

})

return res

}


/* Dateien laden */

fileInput.addEventListener("change",async()=>{

selectedFiles=[...fileInput.files]

logEl.textContent="Dateien werden analysiert...\n"

let allRows=[]

for(const f of selectedFiles){

const html=await readFileSmart(f)

fileCache.set(f.name,html)

const rows=parseLog(html)

logEl.textContent+=f.name+" geladen\n"

allRows.push(...rows)

}

const tvds=findTvd(allRows)

tvdSelect.innerHTML=""

tvds.forEach(v=>{
const o=document.createElement("option")
o.value=v
o.textContent="TVD:"+v
tvdSelect.appendChild(o)
})

tvdSelect.disabled=!tvds.length
buildBtn.disabled=false

logEl.textContent+="Kontakte erkannt: "+tvds.join(", ")

})


/* Excel */

buildBtn.addEventListener("click",async()=>{

logEl.textContent+="\nAuswertung läuft...\n"

let rows=[]

for(const f of selectedFiles){

const html=fileCache.get(f.name)
const r=parseLog(html)

if(addFilename.checked) r.forEach(x=>x.Datei=f.name)

rows.push(...r)

}

rows.sort((a,b)=>toMs(a.Datum,a.Zeit)-toMs(b.Datum,b.Zeit))

const tvd=tvdSelect.value

addSeconds(rows,tvd)

const results=buildResults(rows,tvd)

rows.forEach(r=>r.Datum=formatDate(r.Datum))

const ws1=XLSX.utils.json_to_sheet(rows)
const ws2=XLSX.utils.json_to_sheet(results)

const wb=XLSX.utils.book_new()

XLSX.utils.book_append_sheet(wb,ws1,"Daten")
XLSX.utils.book_append_sheet(wb,ws2,"Ergebnisse")

const today=new Date()
const dateStr=today.toISOString().slice(0,10).replace(/-/g,"")

const filename=`${dateStr}_${anlagenName}_TVD${tvd}.xlsx`

XLSX.writeFile(wb,filename)

statusEl.textContent="Auswertung erzeugt"

logEl.textContent+="Excel erstellt\n"

})

</script>

</body>
</html>
